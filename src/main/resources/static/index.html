<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dicionário</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/script.js" defer></script>
</head>
<body>

  <header>
    <h1>Dicionário de Palavras</h1>
  </header>

  <main>
   
        <section class="intro">
          <h3>Digite a palavra e descubra o significado</h3>
          <p>Digite apenas uma palavra</p>
        </section>


        <section class="pesquisa">
          <form id="formPesquisa">
            <input id="inputTermo" type="text" placeholder="Pesquisar..." required>
            <button type="button" id="idBotaoBusca" onclick="botaoBusca()">Buscar</button>                    
          </form>
        </section>



          <section class="cadastro">

              <h3>Cadastrar nova palavra</h3>

              <input
                  id="inputPalavra"
                  type="text"
                  placeholder="Palavra">

              <input
                  id="inputSignificado"
                  type="text"
                  placeholder="Significado">

              <button
                  type="button"
                  onclick="cadastrar()">

                  Salvar

              </button>

</section>


        <section class="resposta">
      <div id="resultado">

      </div>
      </section>
    
  </main>

    <br><br><br><br>
  <footer>
    <p>Todos os direitos reservados | Aplicação HTML & CSS por Roger</p>
  </footer>


  
</body>
</html>
